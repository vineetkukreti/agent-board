version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/agent-board.db
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5174
      - SESSION_SECRET=change-me-in-production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
